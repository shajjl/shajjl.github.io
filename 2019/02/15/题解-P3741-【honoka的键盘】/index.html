"line">	 	if(s[i]==&apos;K&apos;&amp;&amp;s[i+1]==&apos;K&apos;&amp;&amp;s[i-1]!=&apos;V&apos;&amp;&amp;k==0)</span><br><span class="line">	 	&#123;l++;i++;k++;&#125;//俩K连一块，并且前面不是V（防止VKK）也算一次，计数器加1</span><br><span class="line">        //并且只能改一次，所以k+1（当k=0时，也就是没改过时，才能改动）</span><br><span class="line">        //为防止重复，i+1跳到下面一个字符</span><br><span class="line">	 	if(s[i]==&apos;V&apos;&amp;&amp;s[i+1]==&apos;V&apos;&amp;&amp;s[i+2]!=&apos;K&apos;&amp;&amp;k==0)</span><br><span class="line">	 	&#123;l++;i++;k++;&#125;//同上，防止VVK</span><br><span class="line">	 &#125;</span><br><span class="line">	 cout&lt;&lt;l;//出走</span><br><span class="line">	 return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
