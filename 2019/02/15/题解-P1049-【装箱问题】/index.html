                <h4 id="我做这道题的第一反应：嗯？背包……"><a href="#我做这道题的第一反应：嗯？背包……" class="headerlink" title="我做这道题的第一反应：嗯？背包……"></a>我做这道题的第一反应：嗯？背包……</h4><p> 然后就没了…………</p>
<p> 思路是把它当做重量和价值相同的物体放入背包</p>
<p> 用背包公式可求最大能装多少， 剩余容积=V-最大装多少</p>
 <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">#include&lt;iostream&gt;//P1049</span><br><span class="line">#include&lt;cstdio&gt;</span><br><span class="line">#include&lt;cstring&gt;</span><br><span class="line">#include&lt;string&gt;</span><br><span class="line">#include&lt;iomanip&gt;</span><br><span class="line">#include&lt;algorithm&gt;</span><br><span class="line">#include&lt;cmath&gt;</span><br><span class="line">#include&lt;queue&gt;</span><br><span class="line">#include&lt;stack&gt;</span><br><span class="line">#include&lt;vector&gt;</span><br><span class="line">#include&lt;set&gt;</span><br><span class="line">using namespace std;</span><br><span class="line">int a[20003];</span><br><span class="line">int main()</span><br><span class="line">&#123;</span><br><span class="line">	int n,m,i,j,k;</span><br><span class="line">	cin&gt;&gt;m&gt;&gt;n;</span><br><span class="line">	for(i=1;i&lt;=n;i++)</span><br><span class="line">	&#123;</span><br><span class="line">		cin&gt;&gt;k;//边输边做程序比较简练</span><br><span class="line">		for(j=m;j&gt;=k;j--)a[j]=max(a[j],a[j-k]+k);</span><br><span class="line">	&#125;</span><br><sp
