                <h3 id="一道练习并查集的好题"><a href="#一道练习并查集的好题" class="headerlink" title="一道练习并查集的好题"></a>一道练习并查集的好题</h3><p>直接把并查集模板敲进去，稍微改改就能AC</p>
<p>需要注意的是，在查找村之间是否相互连通时，如果不连通，马上改为联通（并入节点），防止重复查找；</p>
<h2 id="超短代码"><a href="#超短代码" class="headerlink" title="超短代码"></a>超短代码</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br></pre></td><td class="code"><pre><span class="line">#include&lt;iostream&gt;//P1536</span><br><span class="line">#include&lt;cstdio&gt;</span><br><span class="line">#include&lt;cstring&gt;</span><br><span class="line">#include&lt;string&gt;</span><br><span class="line">#include&lt;iomanip&gt;</span><br><span class="line">#include&lt;algorithm&gt;</span><br><span class="line">#include&lt;cmath&gt;</span><br><span class="line">using namespace std;</span><br><span class="line">int s[10000];</span><br><span class="line">int fied(int a)</span><br><span class="line">&#123;while(a!=s[a])a=s[a]=s[s[a]];return a;&#125;</span><br><span class="line">//循环查找祖先，一层一层找，直到找到“根祖先”（&lt;_&lt;）…………</span><br><span class="line">int main()</span><br><span class="line">&#123;</span><br><span class="line">	int a,b,n,m,a1,b1,i,j,k=0;</span><br><span class="line">	cin&gt;&gt;n;</span><br><span class="line">	if(n!=0)cin&gt;&gt;m;</span><br><span class="line">	while(n!=0)//到0停止</span><br><span class="line">	&#123;</span><br><span class="line">		for(i=1;i&lt;=n;i++)s[i]=i;//初始化，自己是自己的祖先</span><br><span class="line">		for(i=1;i&lt;=m;i++)</span><br><span class="line">		&#123;cin&gt;&gt;a&gt;&gt;b;</span><br><span class="line">		 a1=fied(a);b1=fied(b);//查找根节点</span><br><span class="line">		 s[a1]=b1;&#125;</span><br><span class="line">		for(i=1;i&lt;=n;i++)</span><br><span class="line">		 for(j=1;j&lt;=n;j++)</span><br><span class="line">		  if(i!=j)</span><br><span class="line">		  &#123;//枚举每一种连接方式</span><br><span class="line">		  	a1=fied(i);b1=fied(j);</span><br><span class="line">		  	if(a1!=b1)&#123;k++;s[a1]=b1;&#125;</span><br><span class="line">            //很重要！！</span><br><span class="line">            //如果不相通（根节点不同）马上改为相通，防止重复查找</span><br><span class="line">            //累和加1</span><br><span class="line">		  &#125;</span><br><span class="line">		cout&lt;&lt;k&lt;&lt;endl;k=0;//输出并置0</span><br><span class="line">		cin&gt;&gt;n;</span><br><span class="line">		if(n!=0)cin&gt;&gt;m;</span><br><span class="line">    &#125;</span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
